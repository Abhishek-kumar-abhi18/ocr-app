<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>Vabhi OCR</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <img src="{{ url_for('static', filename='logo.png') }}" class="nav-logo">
    <h2>VABHI OCR</h2>
</div>

<!-- MAIN -->
<div class="container">
    <div class="glass-card">

        <!-- LOGO -->
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

        <!-- TITLE -->
        <h1>✨ Image To Text Converter ✨</h1>

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data">

            <!-- DRAG DROP AREA -->
            <label for="fileInput" class="upload-box" id="dropArea">
                <span id="uploadText">📁 Drag & Drop Image or PDF</span>
                <input type="file" name="image" id="fileInput" hidden required>
            </label>

            <!-- PREVIEW -->
            <img id="preview" style="display:none; margin-top:15px; width:100%; border-radius:10px;">

            <!-- BUTTON -->
            <button type="submit">🚀 Extract Text</button>
        </form>

        <!-- OUTPUT -->
        <textarea placeholder="Extracted text will appear here...">{{ extracted_text }}</textarea>

    </div>
</div>

<!-- JS FOR DRAG + PREVIEW -->
<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const uploadText = document.getElementById("uploadText");

// Click to open file
dropArea.addEventListener("click", () => fileInput.click());

// File select
fileInput.addEventListener("change", function() {
    showPreview(this.files[0]);
});

// Drag over
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.style.border = "2px solid white";
});

// Drop file
dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
    showPreview(e.dataTransfer.files[0]);
});

// Preview function
function showPreview(file) {
    if (!file) return;

    uploadText.innerText = file.name;

    if (file.type.startsWith("image")) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";
        }
        reader.readAsDataURL(file);
    } else {
        preview.style.display = "none";
    }
}
</script>

</body>
</html>
